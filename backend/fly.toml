app = "electiondrop-api"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  DJANGO_DEBUG = "false"
  DJANGO_ALLOWED_HOSTS = "electiondrop-api.fly.dev"
  CORS_ALLOWED_ORIGINS = "https://electiondrop.netlify.app"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
